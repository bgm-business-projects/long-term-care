services:
  postgres:
    image: postgres:16-alpine
    container_name: ltc_postgres
    environment:
      POSTGRES_USER: ltc_user
      POSTGRES_PASSWORD: ltc_password
      POSTGRES_DB: ltc_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ltc_user -d ltc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ltc_redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ltc_minio
    environment:
      MINIO_ROOT_USER: ltc_access_key
      MINIO_ROOT_PASSWORD: ltc_secret_key
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # Web Console (http://localhost:19001)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 初始化：自動建立 bucket 並設為公開讀取
  minio-init:
    image: minio/mc:latest
    container_name: ltc_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ltc_access_key ltc_secret_key &&
      mc mb --ignore-existing local/ltc-files &&
      mc anonymous set public local/ltc-files &&
      echo 'MinIO bucket ready.'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
