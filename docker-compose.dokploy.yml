# Dokploy 部署用 docker-compose
#
# 使用方式（Dokploy）：
#   1. 在 Dokploy 建立 Compose 應用，指向此檔
#   2. 在 Environment Variables 設好下列必填變數
#   3. Dokploy 會自動接管反向代理（Traefik）+ SSL，將外部流量導到 app:3000
#
# 必填 env：
#   POSTGRES_PASSWORD          DB 密碼（強密碼）
#   NUXT_BETTER_AUTH_SECRET    better-auth session 簽章金鑰（openssl rand -hex 32）
#   NUXT_BETTER_AUTH_URL       對外網址（如 https://ltc.example.com）
#   MINIO_ROOT_PASSWORD        MinIO 管理密碼
#   NUXT_R2_PUBLIC_URL         MinIO 對外網址（如 https://files.example.com 或 https://ltc.example.com/files）
#
# 選填 env：
#   POSTGRES_USER (default: ltc_user)
#   POSTGRES_DB   (default: ltc_db)
#   MINIO_ROOT_USER (default: ltc_minio_admin)
#   NUXT_R2_BUCKET_NAME (default: ltc-files)
#   NUXT_GOOGLE_CLIENT_ID / NUXT_GOOGLE_CLIENT_SECRET    Google OAuth
#   NUXT_RESEND_API_KEY / NUXT_RESEND_FROM_EMAIL         Email
#   SKIP_MIGRATE=1            停用啟動時自動 migration

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000

      # ── 資料庫 ──
      NUXT_DATABASE_URL: postgres://${POSTGRES_USER:-ltc_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ltc_db}

      # ── Redis（cache / rate limit） ──
      NUXT_REDIS_URL: redis://redis:6379

      # ── better-auth ──
      NUXT_BETTER_AUTH_SECRET: ${NUXT_BETTER_AUTH_SECRET}
      NUXT_BETTER_AUTH_URL: ${NUXT_BETTER_AUTH_URL}

      # ── Google OAuth（選填） ──
      NUXT_GOOGLE_CLIENT_ID: ${NUXT_GOOGLE_CLIENT_ID:-}
      NUXT_GOOGLE_CLIENT_SECRET: ${NUXT_GOOGLE_CLIENT_SECRET:-}

      # ── Resend Email（選填，未設會 fallback console） ──
      NUXT_RESEND_API_KEY: ${NUXT_RESEND_API_KEY:-}
      NUXT_RESEND_FROM_EMAIL: ${NUXT_RESEND_FROM_EMAIL:-}

      # ── 檔案儲存（內建 MinIO） ──
      NUXT_R2_ENDPOINT: http://minio:9000
      NUXT_R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-ltc_minio_admin}
      NUXT_R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      NUXT_R2_BUCKET_NAME: ${NUXT_R2_BUCKET_NAME:-ltc-files}
      NUXT_R2_PUBLIC_URL: ${NUXT_R2_PUBLIC_URL}

      # 啟動時跳過 migration（Dokploy 重啟頻繁時可設 1）
      SKIP_MIGRATE: ${SKIP_MIGRATE:-0}
    expose:
      - "3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ltc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ltc_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ltc_user} -d ${POSTGRES_DB:-ltc_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ltc_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # 把 https://<域名>/files/<key> 反代到 minio:9000/<bucket>/<key>
      - "traefik.http.routers.ltc-files.rule=Host(`${APP_HOST}`) && PathPrefix(`/files`)"
      - "traefik.http.routers.ltc-files.entrypoints=websecure"
      - "traefik.http.routers.ltc-files.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ltc-files.middlewares=ltc-files-rewrite"
      - "traefik.http.middlewares.ltc-files-rewrite.replacepathregex.regex=^/files/(.*)"
      - "traefik.http.middlewares.ltc-files-rewrite.replacepathregex.replacement=/${NUXT_R2_BUCKET_NAME:-ltc-files}/$$1"
      - "traefik.http.services.ltc-files.loadbalancer.server.port=9000"

  # 一次性 job：建立 bucket 並設為公開讀取（讓 NUXT_R2_PUBLIC_URL 可直接存取上傳檔案）
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ltc_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET_NAME: ${NUXT_R2_BUCKET_NAME:-ltc-files}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$BUCKET_NAME &&
      mc anonymous set download local/$$BUCKET_NAME &&
      echo 'MinIO bucket ready.'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  # Dokploy 預設 Traefik 所在網路；必須是 external 才能讓 Traefik 抓到 labels
  dokploy-network:
    external: true
